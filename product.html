<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartiva - Product</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="toast" id="toast"></div>

  <script>
    (function(){
      try{
        const LOGO_KEY = 'cartiva_logo_url_v1';
        const WA_KEY = 'cartiva_whatsapp_url_v1';
        const FB_KEY = 'cartiva_facebook_url_v1';
        const IG_KEY = 'cartiva_instagram_url_v1';
        const WA_ICON_KEY = 'cartiva_whatsapp_icon_v1';
        const FB_ICON_KEY = 'cartiva_facebook_icon_v1';
        const IG_ICON_KEY = 'cartiva_instagram_icon_v1';
        const raw = localStorage.getItem(LOGO_KEY);
        const badge = document.querySelector('.logo-badge');
        if(badge && raw){
          badge.style.backgroundImage = `url('${raw}')`;
          badge.style.backgroundSize = 'cover';
          badge.style.backgroundPosition = 'center';
          badge.textContent = '';
        }
        try{
          const wa = localStorage.getItem(WA_KEY);
          const fb = localStorage.getItem(FB_KEY);
          const ig = localStorage.getItem(IG_KEY);
          if(wa) document.getElementById('linkWhatsApp')?.setAttribute('href', wa);
          if(fb) document.getElementById('linkFacebook')?.setAttribute('href', fb);
          if(ig) document.getElementById('linkInstagram')?.setAttribute('href', ig);
        }catch{}
        const applyIcon = (key, id) => {
          const icon = localStorage.getItem(key);
          const span = document.querySelector(`#${id} .social-icon`);
          if(!span) return;
          if(icon){ span.style.backgroundImage = `url('${icon}')`; span.classList.add('icon-loaded'); }
          else{ span.style.backgroundImage = 'none'; span.classList.remove('icon-loaded'); }
        };
        applyIcon(WA_ICON_KEY,'linkWhatsApp');
        applyIcon(FB_ICON_KEY,'linkFacebook');
        applyIcon(IG_ICON_KEY,'linkInstagram');
      }catch{}
    })();
  </script>

  <div class="topbar">
    <div class="container topbar-inner">
      <div class="store">
        <div class="store-name">Cartiva</div>
      </div>
      <div class="topbar-links">
        <a id="linkWhatsApp" class="topbar-link" href="https://wa.me/message/A2PVWYE7Z7DJF1" target="_blank" rel="noreferrer">
          <span class="social-icon">📱</span>WhatsApp
        </a>
        <span class="dot">•</span>
        <a id="linkFacebook" class="topbar-link" href="https://www.facebook.com/profile.php?id=61586246738322" target="_blank" rel="noreferrer">
          <span class="social-icon">📘</span>Facebook Page
        </a>
        <span class="dot">•</span>
        <a id="linkInstagram" class="topbar-link" href="https://www.instagram.com/cartivabd/?hl=en" target="_blank" rel="noreferrer">
          <span class="social-icon">📷</span>Instagram
        </a>
      </div>
    </div>
  </div>

  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html" aria-label="Cartiva Home">
        <div class="logo-badge">C</div>
        <div class="logo-title">Cartiva</div>
      </a>
      <nav class="nav">
        <a class="pill" href="index.html">Shop</a>
        <a class="pill" href="cart.html">Cart <span class="badge" id="cartCount">0</span></a>
        <a class="pill" href="checkout.html">Checkout</a>
        <a class="pill" id="authPill" href="login.html" style="display:none">Login</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:18px 0 28px">
    <div class="cart-layout">
      <section class="panel">
        <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start">
          <img id="prodImage" alt="Product" style="width:340px; max-width:100%; height:230px; object-fit:cover; border-radius:18px; background: rgba(255,255,255,.02)" />
          <div style="flex:1; min-width:260px">
            <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:8px">
              <h2 id="prodName" style="margin:0; font-size:26px">Product</h2>
              <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
                <div id="prodDelivery" style="display:none; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700; white-space:nowrap; background:rgba(22, 163, 74, 0.12); color:#16a34a">Free delivery</div>
                <div id="prodStock" style="padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700; white-space:nowrap; background:rgba(34, 197, 94, 0.15); color:#22c55e">In Stock</div>
              </div>
            </div>
            <div class="small" id="prodCategory" style="margin-top:6px"></div>
            <div style="margin-top:10px">
              <div id="prodPriceOriginal" class="small" style="text-decoration:line-through; color:var(--muted); margin-bottom:4px"></div>
              <div class="price" id="prodPrice"></div>
            </div>
            <p class="product-desc" id="prodDesc" style="margin-top:10px; font-size:14px"></p>

            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px">
              <button class="btn" id="btnAdd" type="button">Add to cart</button>
              <a class="btn secondary" href="cart.html" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center">View cart</a>
            </div>

            <div class="note" style="margin-top:14px">Tip: You can pass product id like <b>?id=p1</b></div>
          </div>
        </div>
      </section>

      <aside class="panel">
        <h3 style="margin:0 0 10px">Cart Summary</h3>
        <div class="totals" id="totals">
          <div class="total-line"><span>Subtotal</span><strong id="tSubtotal">$0.00</strong></div>
          <div class="total-line"><span>Shipping</span><strong id="tShipping">$0.00</strong></div>
          <div class="hr"></div>
          <div class="total-line"><span>Total</span><strong id="tTotal">$0.00</strong></div>
        </div>
      </aside>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    window.CartivaApiBase = window.CartivaApiBase || 'http://localhost:3000';
  </script>
  <script>
    // Apply admin logo from localStorage
    (function(){
      const KEY='cartiva_logo_url_v1';
      function apply(){
        try{
          const raw=localStorage.getItem(KEY);
          const badge=document.querySelector('.logo-badge');
          if(!badge) return;
          if(raw){
            badge.style.backgroundImage=`url('${raw}')`;
            badge.style.backgroundSize='cover';
            badge.style.backgroundPosition='center';
            badge.textContent='';
          }
        }catch{}
      }
      if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', apply);
      else apply();
    })();
  </script>
  <script>
    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function getQueryId() {
      const sp = new URLSearchParams(location.search);
      return sp.get('id');
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '<')
        .replaceAll('>', '>')
        .replaceAll('"', '"')
        .replaceAll("'", '&#039;');
    }

    const prodId = getQueryId();
    const product = (function(){
      try{
        const raw = localStorage.getItem('cartiva_products_v1');
        const saved = raw ? JSON.parse(raw) : null;
        if(Array.isArray(saved) && saved.length) window.CartivaProducts = saved;
      }catch{}
      const products = window.CartivaProducts || [];
      return products.find(p => p.id === prodId) || null;
    })();

    if (!product) {
      document.getElementById('prodName').textContent = 'Product not found';
      document.getElementById('prodDesc').textContent = 'Use the shop page to pick a valid product.';
      document.getElementById('btnAdd').disabled = true;
    } else {
      const stock = product.stock || 'in-stock';
      const isAvailable = stock === 'in-stock';
      const stockColor = stock === 'in-stock' ? '#22c55e' : stock === 'out-of-stock' ? '#ef4444' : '#f59e0b';
      const stockBg = stock === 'in-stock' ? 'rgba(34, 197, 94, 0.15)' : stock === 'out-of-stock' ? 'rgba(239, 68, 68, 0.15)' : 'rgba(245, 158, 11, 0.15)';
      const stockLabel = stock.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      const hasDiscount = product.originalPrice && product.originalPrice > product.price;
      const productImage = Array.isArray(product.images) ? product.images[0] : product.image;

      document.getElementById('prodImage').src = productImage || '';
      document.getElementById('prodImage').alt = product.name;
      document.getElementById('prodName').textContent = product.name;
      document.getElementById('prodCategory').textContent = product.category;
      document.getElementById('prodPrice').textContent = window.CartivaCart.formatMoney(product.price);
      if (hasDiscount) {
        document.getElementById('prodPriceOriginal').textContent = window.CartivaCart.formatMoney(product.originalPrice);
      }
      const deliveryOption = product.deliveryOption || 'delivery-included';
      document.getElementById('prodStock').textContent = stockLabel;
      document.getElementById('prodStock').style.background = stockBg;
      document.getElementById('prodStock').style.color = stockColor;
      document.getElementById('prodDesc').textContent = product.description;
      if (deliveryOption === 'free-delivery') {
        const badge = document.getElementById('prodDelivery');
        badge.style.display = 'inline-flex';
      }

      if (!isAvailable) {
        document.getElementById('btnAdd').disabled = true;
        document.getElementById('btnAdd').textContent = stock === 'upcoming' ? 'Coming Soon' : 'Out of Stock';
        document.getElementById('btnAdd').style.opacity = '0.55';
      } else {
        document.getElementById('btnAdd').addEventListener('click', () => {
          window.CartivaCart.addToCart(product.id, 1);
          showToast('Added to cart');
        });
      }
    }

    function renderTotals(){
      document.getElementById('cartCount').textContent = String(window.CartivaCart.getCartCount());
      const totals = window.CartivaCart.getTotals();
      document.getElementById('tSubtotal').textContent = window.CartivaCart.formatMoney(totals.subtotal);
      document.getElementById('tShipping').textContent = window.CartivaCart.formatMoney(totals.shipping);
      document.getElementById('tTotal').textContent = window.CartivaCart.formatMoney(totals.total);
    }

    window.addEventListener('cartiva:cartChanged', renderTotals);

    function syncAuthPill(){
      try{
        const pill=document.getElementById('authPill');
        if(!pill || !window.UserAuth) return;
        const u=window.UserAuth.getCurrentUser();
        if(u){
          pill.textContent='Logout ('+u.email+')';
          pill.href='#';
          pill.style.display='inline-flex';
          pill.addEventListener('click',(e)=>{
            e.preventDefault();
            window.UserAuth.logout();
            syncAuthPill();
          },{once:true});
        } else {
          pill.textContent='Login';
          pill.href='login.html';
          pill.style.display='none';
        }
      }catch{}
    }

    renderTotals();
    syncAuthPill();
  </script>
</body>
</html>
