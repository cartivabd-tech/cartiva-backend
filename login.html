<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartiva Admin Login</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif;
            background-color: #0a1128; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background-color: #1c2541; padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
        }
        h2 { margin-top: 0; color: #00b4d8; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 0.9em; }
        input {
            width: 100%; padding: 12px; box-sizing: border-box;
            background-color: #0b0c10; border: 1px solid #45f3ff33;
            color: white; border-radius: 4px; outline: none;
        }
        button {
            width: 100%; background-color: #00b4d8; color: white; border: none;
            padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .error-msg { color: #e63946; font-size: 0.9em; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // ব্যাকএন্ডের মেইন এপিআই লিংক
        const API_URL = 'https://cartiva-backend.vercel.app/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                // আপনার ব্যাকএন্ডের মেইন অ্যাডমিন লগইন রাউটে হিট করা হচ্ছে
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Invalid credentials');
                }

                // লগইন সফল হলে ব্রাউজার মেমোরিতে টোকেন সেভ করবে
                localStorage.setItem('adminToken', data.token);
                
                // টোকেন সেভ হওয়ার পর সাকসেসফুলি অ্যাডমিন ড্যাশবোর্ডে নিয়ে যাবে
                window.location.href = '/admin.html';

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
