<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartiva - Customer Login</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif;
            background-color: #0a1128; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background-color: #1c2541; padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
        }
        h2 { margin-top: 0; color: #00b4d8; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 0.9em; }
        input {
            width: 100%; padding: 12px; box-sizing: border-box;
            background-color: #0b0c10; border: 1px solid #45f3ff33;
            color: white; border-radius: 4px; outline: none;
        }
        button {
            width: 100%; background-color: #00b4d8; color: white; border: none;
            padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .error-msg { color: #e63946; font-size: 0.9em; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Customer Login</h2>

        <div style="display:flex; gap:10px; margin-bottom:18px;">
            <button type="button" id="tabLogin" style="flex:1; background:#00b4d8; border:none; padding:12px; border-radius:6px; font-weight:700; cursor:pointer;">Login</button>
            <button type="button" id="tabSignup" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:12px; border-radius:6px; font-weight:700; cursor:pointer; color:white;">Sign up</button>
        </div>

        <form id="customerLoginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <button type="submit" id="submitBtn">Login</button>
        </form>

        <div style="margin-top:14px; margin-bottom:10px; color:#cbd5e1; font-size:0.9em; text-align:center;">or</div>

        <button type="button" id="googleSignInBtn" style="background: #ffffff; color: #111827; border: none; width:100%; padding:12px; border-radius:6px; cursor:pointer; font-weight:800;">Continue with Google</button>

        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script src="js/google-config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const API_URL = (window.CartivaApiBase || 'https://cartiva-backend.vercel.app') + '/api';

        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const submitBtn = document.getElementById('submitBtn');
        const tabLogin = document.getElementById('tabLogin');
        const tabSignup = document.getElementById('tabSignup');

        let mode = 'login'; // login | signup

        function setMode(next) {
            mode = next;
            const isLogin = mode === 'login';
            tabLogin.style.background = isLogin ? '#00b4d8' : 'rgba(255,255,255,0.05)';
            tabLogin.style.border = isLogin ? 'none' : '1px solid rgba(255,255,255,0.1)';
            tabSignup.style.background = isLogin ? 'rgba(255,255,255,0.05)' : '#00b4d8';
            tabSignup.style.border = isLogin ? '1px solid rgba(255,255,255,0.1)' : 'none';
            submitBtn.textContent = isLogin ? 'Login' : 'Sign up';
        }

        tabLogin.addEventListener('click', () => setMode('login'));
        tabSignup.addEventListener('click', () => setMode('signup'));

        document.getElementById('customerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const endpoint = mode === 'signup' ? `${API_URL}/auth/register` : `${API_URL}/auth/login`;

                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("Server returned an invalid response. Please try again.");
                }

                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || 'Request failed');

                localStorage.setItem('cartiva_customer_session_v2', JSON.stringify({ token: data.token, email: data.user?.email || email }));

                window.location.href = '/index.html';
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
            }
        });

        // Google Sign-In: exchange credential for our backend JWT.
        let googleInitialized = false;
        function initGoogle() {
            if (googleInitialized) return;
            googleInitialized = true;

            const clientId = window.CartivaGoogleClientId;
            if (!clientId || String(clientId).includes('PASTE_YOUR_GOOGLE_CLIENT_ID_HERE')) {
                googleSignInBtn.disabled = true;
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerText = 'Google client ID is not configured (update js/google-config.js).';
                return;
            }

            window.google.accounts.id.initialize({
                client_id: clientId,
                callback: async (response) => {
                    try {
                        const credential = response.credential;
                        const res = await fetch(`${API_URL}/auth/google`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ credential })
                        });

                        const data = await res.json().catch(() => ({}));
                        if (!res.ok || !data.ok) throw new Error(data.error || 'Google sign-in failed');

                        localStorage.setItem('cartiva_customer_session_v2', JSON.stringify({
                            token: data.token,
                            email: data.user?.email || ''
                        }));

                        window.location.href = '/index.html';
                    } catch (err) {
                        const errorMsg = document.getElementById('errorMsg');
                        errorMsg.innerText = err.message;
                        errorMsg.style.display = 'block';
                    }
                }
            });

            googleSignInBtn.addEventListener('click', () => {
                window.google.accounts.id.prompt();
            }, { once: true });
        }

        // Wait for google script to load.
        const waitGoogle = setInterval(() => {
            if (window.google && window.google.accounts && window.google.accounts.id) {
                clearInterval(waitGoogle);
                initGoogle();
            }
        }, 200);
    </script>
</body>
</html>
