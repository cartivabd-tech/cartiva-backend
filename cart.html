<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartiva - Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="topbar">
    <div class="container topbar-inner">
      <div class="store"><div class="store-name" id="liveStoreName">Cartiva</div></div>
      <div class="topbar-links">
        <a id="linkWhatsApp" class="topbar-link" href="#" target="_blank" rel="noreferrer"><span class="social-icon">📱</span>WhatsApp</a>
        <span class="dot">•</span>
        <a id="linkFacebook" class="topbar-link" href="#" target="_blank" rel="noreferrer"><span class="social-icon">📘</span>Facebook Page</a>
        <span class="dot">•</span>
        <a id="linkInstagram" class="topbar-link" href="#" target="_blank" rel="noreferrer"><span class="social-icon">📷</span>Instagram</a>
        <span class="dot">•</span>
        <a id="linkTikTok" class="topbar-link" href="#" target="_blank" rel="noreferrer"><span class="social-icon">🎵</span>TikTok</a>
      </div>
    </div>
  </div>

  <header class="header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <div class="logo-badge">C</div>
        <div class="logo-title">Cartiva</div>
      </a>
      <nav class="nav">
        <a class="pill" href="index.html">Shop</a>
        <a class="pill active" href="cart.html">Cart <span class="badge" id="cartCount">0</span></a>
        <a class="pill" href="checkout.html">Checkout</a>
        <a class="pill" id="authPill" href="login.html" style="display:none">Login</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="checkout-grid" style="margin-top:20px;">
      <div class="checkout-form-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Your Cart</h2>
          <button class="btn btn-secondary" id="clearCartBtn" style="padding:6px 12px; font-size:13px;">Clear cart</button>
        </div>
        
        <div id="cartItemsList">Loading your cart items...</div>
        
        <div style="margin-top:20px;">
          <a class="btn btn-secondary" href="index.html">Continue shopping</a>
        </div>
      </div>

      <div class="checkout-summary-section">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="summarySubtotal">৳0</strong>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <strong id="summaryShipping">৳0</strong>
        </div>
        <hr style="border:0; border-top:1px solid #2d3748; margin:15px 0;" />
        <div class="summary-row" style="font-size:18px;">
          <span>Total</span>
          <strong id="summaryTotal" style="color:var(--accent);">৳0</strong>
        </div>
        
        <button class="btn" id="goToCheckoutBtn" style="width:100%; margin-top:20px; padding:12px;">Go to checkout</button>
        <button class="btn btn-secondary" id="refreshCartBtn" style="width:100%; margin-top:10px; padding:8px; font-size:13px;">Refresh Cart</button>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    window.CartivaApiBase = window.CartivaApiBase || window.location.origin;
    const API_URL = window.CartivaApiBase + '/api/store';

    let liveProducts = [];
    let currentCart = [];

    const cartList = document.getElementById('cartItemsList');
    const subtotalEl = document.getElementById('summarySubtotal');
    const shippingEl = document.getElementById('summaryShipping');
    const totalEl = document.getElementById('summaryTotal');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      clearTimeout(showToast._t); showToast._t = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    // ব্যাকএন্ড থেকে তাজা ডাটা এবং সেটিংস লোড করা হচ্ছে
    async function loadBackendData() {
      try {
        const res = await fetch(API_URL);
        if(res.ok) {
          const store = await res.json();
          liveProducts = store.products || [];
          
          if(store.settings) {
            const s = store.settings;
            if(s.logoUrl) {
              document.querySelectorAll('.logo-badge').forEach(b => {
                b.style.backgroundImage = `url('${s.logoUrl}')`;
                b.style.backgroundSize = 'cover'; b.textContent = '';
              });
            }
            if(s.waUrl) document.getElementById('linkWhatsApp').href = s.waUrl;
            if(s.fbUrl) document.getElementById('linkFacebook').href = s.fbUrl;
            if(s.igUrl) document.getElementById('linkInstagram').href = s.igUrl;
            if(s.tikTokUrl) document.getElementById('linkTikTok').href = s.tikTokUrl;
          }
        }
      } catch(e) {
        console.log("Cart page backend sync error:", e);
      }
      
      readAndRenderCart();
    }

    // কার্টের লোকাল ডেটা মঙ্গোডিবি আইডির সাথে সিঙ্ক করে রেন্ডার করার ফাংশন
    function readAndRenderCart() {
      // ১. গ্লোবাল অবজেক্ট বা লোকাল স্টোরেজ থেকে কার্ট আইটেম রিড করা হচ্ছে
      if (window.CartivaCart && typeof window.CartivaCart.getCartItems === 'function') {
        currentCart = window.CartivaCart.getCartItems();
      } else {
        try {
          currentCart = JSON.parse(localStorage.getItem('cartiva_cart_v1')) || [];
        } catch(e) { currentCart = []; }
      }

      // টপবার ব্যাজ আপডেট
      const totalItems = currentCart.reduce((sum, item) => sum + (item.qty || item.quantity || 0), 0);
      document.getElementById('cartCount').textContent = String(totalItems);

      if (currentCart.length === 0) {
        cartList.innerHTML = '<div style="padding:30px; text-align:center; color:var(--muted);">Your cart is empty.</div>';
        subtotalEl.textContent = '৳0';
        shippingEl.textContent = '৳0';
        totalEl.textContent = '৳0';
        return;
      }

      let subtotal = 0;

      cartList.innerHTML = currentCart.map(item => {
        // কার্ট আইটেমের আইডির সাথে ব্যাকএন্ডের প্রোডাক্ট ম্যাচিং
        const itemId = item.id || item.productId;
        const p = liveProducts.find(x => (x.id === itemId || x._id === itemId)) || item;
        
        const price = Number(p.price || 0);
        const qty = Number(item.qty || item.quantity || 1);
        const itemTotal = price * qty;
        subtotal += itemTotal;

        return `
          <div class="cart-item" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2d3748; padding:15px 0; gap:15px;">
            <div style="display:flex; align-items:center; gap:15px;">
              <img src="${p.image || ''}" alt="${p.name || 'Product'}" style="width:60px; height:60px; object-fit:cover; border-radius:6px; background:#1a202c;" />
              <div>
                <h4 style="margin:0 0 5px 0; font-size:16px;">${p.name || 'Unknown Product'}</h4>
                <div style="color:var(--accent); font-weight:bold;">৳${price}</div>
              </div>
            </div>
            
            <div style="display:flex; align-items:center; gap:12px;">
              <div style="display:flex; align-items:center; background:#1a202c; border-radius:4px; border:1px solid #2d3748;">
                <button class="qty-btn" onclick="updateQty('${itemId}', -1)" style="background:none; border:none; color:#fff; padding:6px 12px; cursor:pointer; font-weight:bold;">-</button>
                <span style="padding:0 4px; font-weight:bold; min-width:20px; text-align:center;">${qty}</span>
                <button class="qty-btn" onclick="updateQty('${itemId}', 1)" style="background:none; border:none; color:#fff; padding:6px 12px; cursor:pointer; font-weight:bold;">+</button>
              </div>
              <button class="btn btn-secondary" onclick="removeItem('${itemId}')" style="padding:6px 10px; font-size:12px; background:#ef4444; color:#fff; border:none;">✕</button>
            </div>
          </div>
        `;
      }).join('');

      // অর্ডার সামারি ক্যালকুলেশন ফিক্স
      const shipping = subtotal > 0 ? 60 : 0; // ডেমো শিপিং চার্জ ৬০ টাকা
      const total = subtotal + shipping;

      subtotalEl.textContent = '৳' + subtotal;
      shippingEl.textContent = '৳' + shipping;
      totalEl.textContent = '৳' + total;
    }

    // কার্ট আইটেমের সংখ্যা বাড়ানো/কমানোর গ্লোবাল ফাংশন
    window.updateQty = function(id, change) {
      if (window.CartivaCart && typeof window.CartivaCart.addToCart === 'function') {
        window.CartivaCart.addToCart(id, change);
      } else {
        let cart = [];
        try { cart = JSON.parse(localStorage.getItem('cartiva_cart_v1')) || []; } catch(e){}
        const item = cart.find(x => x.id === id);
        if (item) {
          item.qty = (item.qty || 1) + change;
          if (item.qty <= 0) {
            cart = cart.filter(x => x.id !== id);
          }
          localStorage.setItem('cartiva_cart_v1', JSON.stringify(cart));
          window.dispatchEvent(new CustomEvent('cartiva:cartChanged'));
        }
      }
      readAndRenderCart();
    };

    // কার্ট থেকে সিঙ্গেল আইটেম ডিলিট করার ফাংশন
    window.removeItem = function(id) {
      if (window.CartivaCart && typeof window.CartivaCart.removeFromCart === 'function') {
        window.CartivaCart.removeFromCart(id);
      } else {
        let cart = [];
        try { cart = JSON.parse(localStorage.getItem('cartiva_cart_v1')) || []; } catch(e){}
        cart = cart.filter(x => x.id !== id);
        localStorage.setItem('cartiva_cart_v1', JSON.stringify(cart));
        window.dispatchEvent(new CustomEvent('cartiva:cartChanged'));
      }
      showToast('Item removed from cart');
      readAndRenderCart();
    };

    // পুরো কার্ট ক্লিয়ার করার লজিক
    document.getElementById('clearCartBtn').addEventListener('click', () => {
      if (window.CartivaCart && typeof window.CartivaCart.clearCart === 'function') {
        window.CartivaCart.clearCart();
      } else {
        localStorage.removeItem('cartiva_cart_v1');
        window.dispatchEvent(new CustomEvent('cartiva:cartChanged'));
      }
      showToast('Cart cleared');
      readAndRenderCart();
    });

    document.getElementById('refreshCartBtn').addEventListener('click', () => {
      loadBackendData();
      showToast('Cart reloaded from database');
    });

    document.getElementById('goToCheckoutBtn').addEventListener('click', () => {
      if(currentCart.length === 0) {
        showToast('Your cart is empty!');
        return;
      }
      window.location.href = 'checkout.html';
    });

    function syncAuthPill() {
      try {
        const pill = document.getElementById('authPill');
        if (!pill || !window.UserAuth) return;
        const u = window.UserAuth.getCurrentUser();
        if (u) {
          pill.textContent = 'Logout (' + u.email + ')';
          pill.href = '#';
          pill.style.display = 'inline-flex';
        }
      } catch {}
    }

    window.addEventListener('cartiva:cartChanged', readAndRenderCart);

    // রান ইনিশিয়েট
    loadBackendData();
    setTimeout(syncAuthPill, 500);
  </script>
</body>
</html>
