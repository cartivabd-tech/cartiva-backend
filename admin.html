<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartiva Admin</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #ffffff;
            --accent-color: #00b4d8;
            --success-color: #2a9d8f;
            --error-color: #e63946;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .header {
            background-color: var(--card-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a506b;
        }
        .status-banner {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            margin: 15px 30px;
            border-radius: 6px;
        }
        .status-banner.success { background-color: var(--success-color); }
        .status-banner.error { background-color: var(--error-color); }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 0 30px 30px 30px;
        }
        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: var(--accent-color); border-bottom: 1px solid #3a506b; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #cbd5e1; }
        input, select, textarea {
            width: 100%; padding: 10px; box-sizing: border-box;
            background-color: #0b0c10; border: 1px solid #45f3ff33;
            color: white; border-radius: 4px; outline: none;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            background-color: var(--accent-color); color: white; border: none;
            padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #3a506b; }
        th { background-color: #0b0c10; color: var(--accent-color); }
        .badge { background: var(--success-color); padding: 3px 8px; border-radius: 4px; font-size: 0.8em; }
        
        /* 🔐 Admin Login Overlay CSS */
        .admin-login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background-color: var(--card-bg); padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
        }
        .login-card h2 { text-align: center; margin-bottom: 25px; }
        .login-card button { width: 100%; margin-top: 10px; }
        .error-msg { color: var(--error-color); font-size: 0.9em; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div id="adminLoginOverlay" class="admin-login-overlay" style="display: none;">
        <div class="login-card">
            <h2>Admin Security Login</h2>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="adminUsername" required placeholder="Enter admin username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" required placeholder="Enter admin password">
                </div>
                <button type="submit">Unlock Dashboard</button>
            </form>
            <div id="loginErrorMsg" class="error-msg"></div>
        </div>
    </div>

    <div id="mainDashboardWrapper">
        <div class="header">
            <h1>Cartiva Admin Panel</h1>
            <div>
                <button id="refreshOrdersBtn" style="margin-right: 10px; background-color: var(--success-color);">Refresh Orders</button>
                <button id="logoutBtn" style="background-color: var(--error-color);">Logout</button>
            </div>
        </div>

        <div id="syncStatus" class="status-banner error">❌ Checking Cloud Sync...</div>

        <div class="container">
            <div class="card">
                <h2>Product Manager</h2>
                <form id="productForm">
                    <div class="form-group">
                        <label>Product ID (unique)</label>
                        <input type="text" id="prodId" required placeholder="e.g., p1">
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="prodName" required placeholder="Product Name">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Original Price</label>
                            <input type="number" id="prodOriginalPrice" step="0.01" placeholder="16.99">
                        </div>
                        <div class="form-group">
                            <label>Discount Price</label>
                            <input type="number" id="prodPrice" step="0.01" required placeholder="12.99">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Stock Status</label>
                            <select id="prodStock">
                                <option value="In Stock">In Stock</option>
                                <option value="Out of Stock">Out of Stock</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Delivery Option</label>
                            <select id="prodDelivery">
                                <option value="Delivery Include">Delivery Include</option>
                                <option value="Delivery Charge Extra">Delivery Charge Extra</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="prodCategory">
                            <option value="HeadPhone">HeadPhone</option>
                            <option value="Watch">Watch</option>
                            <option value="Gadget">Gadget</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="prodDesc" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Main Image URL</label>
                        <input type="text" id="prodImage" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>Gallery Image URLs (Comma separated)</label>
                        <input type="text" id="prodImages" placeholder="url1, url2, url3">
                    </div>
                    <button type="submit" style="width: 100%;">Save Product</button>
                </form>
            </div>

            <div class="card">
                <h2>Orders List</h2>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Total</th>
                                <th>Items</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="5" style="text-align:center;">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>

                <h2 style="margin-top: 30px;">Existing Live Products</h2>
                <div style="max-height: 300px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr><td colspan="5" style="text-align:center;">Loading products...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://cartiva-backend.vercel.app/api'; 
        let localProducts = [];

        const syncStatus = document.getElementById('syncStatus');
        const productForm = document.getElementById('productForm');
        const productsTableBody = document.getElementById('productsTableBody');
        const ordersTableBody = document.getElementById('ordersTableBody');
        const refreshOrdersBtn = document.getElementById('refreshOrdersBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const adminLoginOverlay = document.getElementById('adminLoginOverlay');
        const mainDashboardWrapper = document.getElementById('mainDashboardWrapper');
        const adminLoginForm = document.getElementById('adminLoginForm');
        const loginErrorMsg = document.getElementById('loginErrorMsg');

        function getAdminToken() { return localStorage.getItem('adminToken'); }

        // 🛡️ Authenticate Logic (Fixed double style typo)
        function checkAuth() {
            const token = getAdminToken();
            if (!token) {
                adminLoginOverlay.style.display = 'flex';
                mainDashboardWrapper.style.pointerEvents = 'none';
                mainDashboardWrapper.style.opacity = '0.1';
            } else {
                adminLoginOverlay.style.display = 'none';
                mainDashboardWrapper.style.pointerEvents = 'auto';
                mainDashboardWrapper.style.opacity = '1';
                fetchStoreData();
                fetchOrders();
            }
        }

        // 🔐 Admin Login Handler
        adminLoginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginErrorMsg.style.display = 'none';
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    checkAuth();
                } else {
                    throw new Error(data.error || 'Invalid admin credentials');
                }
            } catch (err) {
                loginErrorMsg.innerText = err.message;
                loginErrorMsg.style.display = 'block';
            }
        });

        function setOnlineStatus(isOnline, message = '') {
            if (isOnline) {
                syncStatus.className = 'status-banner success';
                syncStatus.innerHTML = '✅ Cloud Synced Successfully. Connected to Database.';
            } else {
                syncStatus.className = 'status-banner error';
                syncStatus.innerHTML = `❌ Cloud Sync Failed. Offline mode active. ${message}`;
            }
        }

        async function fetchStoreData() {
            try {
                const res = await fetch(`${API_URL}/store`);
                if (!res.ok) throw new Error('Server error');
                const data = await res.json();
                localProducts = data.products || [];
                renderProducts(localProducts);
                setOnlineStatus(true);
            } catch (err) {
                console.error(err);
                setOnlineStatus(false, '(Cannot connect to backend API)');
            }
        }

        function renderProducts(products) {
            productsTableBody.innerHTML = '';
            if (products.length === 0) {
                productsTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No products found.</td></tr>';
                return;
            }
            products.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${p.id}</strong></td>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td><span class="badge">${p.stock || 'In Stock'}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editProduct('${p.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteProduct('${p.id}')">Delete</button>
                    </td>
                `;
                productsTableBody.appendChild(tr);
            });
        }

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = getAdminToken();
            if (!token) return alert('Session expired. Please login again.');

            const payload = {
                id: document.getElementById('prodId').value.trim(),
                name: document.getElementById('prodName').value.trim(),
                price: parseFloat(document.getElementById('prodPrice').value),
                originalPrice: document.getElementById('prodOriginalPrice').value ? parseFloat(document.getElementById('prodOriginalPrice').value) : null,
                stock: document.getElementById('prodStock').value,
                deliveryOption: document.getElementById('prodDelivery').value,
                category: document.getElementById('prodCategory').value,
                description: document.getElementById('prodDesc').value.trim(),
                image: document.getElementById('prodImage').value.trim(),
                images: document.getElementById('prodImages').value.split(',').map(s => s.trim()).filter(Boolean)
            };

            try {
                const res = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('Failed to save');
                alert('Product saved successfully!');
                productForm.reset();
                fetchStoreData();
            } catch (err) { alert(`Error: ${err.message}`); }
        });

        window.editProduct = function(id) {
            const p = localProducts.find(item => item.id === id);
            if (!p) return alert('Product not found');
            document.getElementById('prodId').value = p.id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
            document.getElementById('prodStock').value = p.stock || 'In Stock';
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodImage').value = p.image || '';
        };

        window.deleteProduct = async function(id) {
            if (!confirm(`Delete product ${id}?`)) return;
            const token = getAdminToken();
            try {
                const res = await fetch(`${API_URL}/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Delete failed');
                alert('Product deleted.');
                fetchStoreData();
            } catch (err) { alert(err.message); }
        };

        async function fetchOrders() {
            const token = getAdminToken();
            if (!token) return;
            try {
                const res = await fetch(`${API_URL}/admin/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                renderOrders(data.orders || []);
            } catch (err) {
                ordersTableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Failed to load orders.</td></tr>`;
            }
        }

        function renderOrders(orders) {
            ordersTableBody.innerHTML = '';
            if (orders.length === 0) {
                ordersTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No orders found.</td></tr>';
                return;
            }
            orders.forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${o.orderId || 'N/A'}</td>
                    <td>${o.customer?.fullName || 'N/A'}</td>
                    <td>$${o.totals?.total || 0}</td>
                    <td>${o.items ? o.items.length : 0} items</td>
                    <td><span class="badge">${o.status || 'Pending'}</span></td>
                `;
                ordersTableBody.appendChild(tr);
            });
        }

        refreshOrdersBtn.addEventListener('click', fetchOrders);
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            checkAuth();
        });

        // Initialize
        checkAuth();
    </script>
</body>
</html>
